{% extends "base.html" %} {% block title %}FileUpload{% endblock %} {% block
content%}

<div style="text-align: center">
  <h1>ROUTE = <code>fup.html</code></h1>

  <p class="terminal-green">fup.html</p>

  <p>This page corresponds to function in <code>routes/posts.py</code></p>

  <!-- Display message if it exists -->
  {% if message %}
  <div
    style="margin: 20px auto; padding: 10px; width: 50%; border-radius: 5px; {% if 'Successful' in message %}background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;{% else %}background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;{% endif %}">
    {{ message }}
  </div>
  {% endif %}

  <div>
    <article style="display: inline-block; width: auto; text-align: center">
      <h3 style="color: oklch(76.8% 0.233 130.85)">Upload Form</h3>
      <form
        method="POST"
        action="{{ url_for('posts.file_upload') }}"
        enctype="multipart/form-data">
        <input type="file" name="file" accept=".txt, .csv" />
        <input type="submit" , value="UploadPanty" />
      </form>
    </article>
  </div>

  <button onclick="window.open('https://tinyurl.com/2usd6fpd', '_blank')">
    BootySmell
  </button>
</div>
{% endblock %}
